<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小瓜 · 喂饭陪伴对话</title>
<style>
  :root {
    --bg: #f7f0e4;
    --paper: #fffaf3;
    --text: #221812;
    --muted: #70594f;
    --accent: #d65a31;
    --teal: #1d6d73;
    --gold: #f2bf5e;
    --line: rgba(96,65,48,.14);
    --bubble-user: linear-gradient(135deg, #d65a31, #ea7b44);
    --bubble-bot: #fffaf3;
    --shadow: 0 12px 40px rgba(70,34,16,.12);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(242,191,94,.35), transparent 32%),
      radial-gradient(circle at right 20%, rgba(29,109,115,.16), transparent 30%),
      linear-gradient(180deg,#f5eee2,#f7f0e4 45%,#f3ecdf);
    display: flex; justify-content: center; padding: 24px 14px;
  }
  .app { width: min(100%, 640px); display: flex; flex-direction: column; height: calc(100vh - 48px); }

  header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px; margin-bottom: 14px;
    background: rgba(255,250,243,.8); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.5); border-radius: 22px; box-shadow: var(--shadow);
  }
  .avatar {
    width: 52px; height: 52px; border-radius: 16px; flex: none;
    display: grid; place-items: center; font-size: 28px;
    background: linear-gradient(135deg, var(--gold), var(--accent));
  }
  header h1 { margin: 0; font-size: 1.3rem; }
  header p { margin: 2px 0 0; color: var(--muted); font-size: .86rem; }
  .status-pill {
    margin-left: auto; font-size: .78rem; color: var(--teal); font-weight: 700;
    background: rgba(29,109,115,.1); padding: 7px 12px; border-radius: 999px; text-align: right;
  }

  /* 语音输入面板(本地唤醒词 + 豆包流式 ASR 的状态与实时文本) */
  .voice-panel {
    display: grid; grid-template-columns: 52px minmax(0, 1fr); gap: 14px;
    align-items: center; margin-bottom: 14px; padding: 12px 16px;
    background: rgba(255,250,243,.86); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.5); border-radius: 22px; box-shadow: var(--shadow);
  }
  .mic-toggle {
    width: 52px; height: 52px; border-radius: 50%; flex: none; cursor: pointer;
    border: 1px solid var(--line); background: var(--paper); color: var(--teal);
    font-size: 1.35rem; display: grid; place-items: center;
    transition: background .15s ease, color .15s ease, transform .15s ease;
  }
  .mic-toggle:hover { transform: translateY(-1px); }
  .mic-toggle.active {
    background: linear-gradient(135deg, var(--teal), #2b8f92);
    color: #fffaf4; border-color: transparent;
  }
  .mic-toggle:disabled { opacity: .55; cursor: wait; transform: none; }
  .voice-copy { min-width: 0; }
  .voice-status { display: block; color: var(--teal); font-weight: 700; font-size: .9rem; }
  .voice-status[data-state="error"] { color: var(--accent); }
  .voice-transcript {
    display: block; min-height: 1.4em; margin-top: 3px; color: var(--muted);
    font-size: .88rem; overflow-wrap: anywhere;
  }

  .chat {
    flex: 1; overflow-y: auto; padding: 6px 4px 4px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .row { display: flex; gap: 10px; align-items: flex-end; }
  .row.user { flex-direction: row-reverse; }
  .mini-avatar {
    width: 34px; height: 34px; border-radius: 11px; flex: none; display: grid;
    place-items: center; font-size: 18px;
  }
  .mini-avatar.bot { background: linear-gradient(135deg,var(--gold),var(--accent)); }
  .mini-avatar.user { background: rgba(29,109,115,.16); }
  .bubble {
    max-width: 78%; padding: 12px 16px; line-height: 1.6; border-radius: 18px;
    box-shadow: var(--shadow); font-size: 1rem;
  }
  .user .bubble { background: var(--bubble-user); color: #fffaf4; border-bottom-right-radius: 6px; }
  .bot  .bubble { background: var(--bubble-bot); border: 1px solid var(--line); border-bottom-left-radius: 6px; }

  /* 意图/动作提示卡(演示用,直观展示后台判断) */
  .meta {
    align-self: flex-start; max-width: 88%;
    font-size: .82rem; color: var(--muted);
    background: rgba(255,255,255,.55); border: 1px dashed var(--line);
    border-radius: 14px; padding: 8px 12px; line-height: 1.55;
  }
  .meta .tag { display: inline-block; font-weight: 700; padding: 1px 8px; border-radius: 999px; margin-right: 6px; }
  .tag.cmd  { background: rgba(214,90,49,.14); color: var(--accent); }
  .tag.talk { background: rgba(29,109,115,.14); color: var(--teal); }
  .meta code { background: rgba(96,65,48,.08); padding: 1px 6px; border-radius: 6px; }

  .composer {
    margin-top: 12px; display: flex; gap: 10px; align-items: flex-end;
    padding: 12px; background: rgba(255,250,243,.86); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.5); border-radius: 22px; box-shadow: var(--shadow);
  }
  textarea {
    flex: 1; resize: none; border: none; outline: none; background: transparent;
    font: inherit; color: var(--text); max-height: 120px; padding: 8px 6px; line-height: 1.5;
  }
  .send {
    flex: none; border: none; cursor: pointer; color: #fffaf4; font-weight: 700;
    padding: 0 22px; height: 46px; border-radius: 14px;
    background: linear-gradient(135deg,var(--accent),#ea7b44);
    transition: transform .15s ease, opacity .15s ease;
  }
  .send:hover { transform: translateY(-1px); }
  .send:disabled { opacity: .5; cursor: default; transform: none; }
  .hint { text-align: center; color: var(--muted); font-size: .78rem; margin: 8px 0 0; }
  .quick { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .quick button {
    border: 1px solid var(--line); background: rgba(255,255,255,.5); color: var(--muted);
    border-radius: 999px; padding: 6px 12px; font-size: .82rem; cursor: pointer;
  }
  .quick button:hover { color: var(--text); background: rgba(214,90,49,.08); }
  .typing { color: var(--muted); font-style: italic; }

  /* 适老化 · 大字体切换按钮 */
  .a11y-toggle {
    flex: none; cursor: pointer; font-weight: 700; font-size: .82rem;
    color: var(--teal); background: rgba(29,109,115,.1);
    border: 1px solid rgba(29,109,115,.22); border-radius: 999px; padding: 7px 12px;
  }
  .a11y-toggle[aria-pressed="true"] { color: #fffaf4; background: var(--teal); }
  .header-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  /* 动作步骤时间线(命令卡里直观展示机械臂动作顺序) */
  .steps { display: inline-flex; flex-wrap: wrap; gap: 6px; align-items: center; vertical-align: middle; }
  .steps .step {
    background: rgba(214,90,49,.12); color: var(--accent); font-weight: 700;
    border-radius: 8px; padding: 2px 9px; font-size: .82rem;
  }
  .steps .arrow { color: var(--muted); font-weight: 700; }

  /* 偏好记忆提示(一顿饭结束时,小瓜记住的吃饭偏好) */
  .pref-note {
    align-self: flex-start; max-width: 88%; font-size: .82rem; color: var(--teal);
    background: rgba(29,109,115,.08); border: 1px solid rgba(29,109,115,.2);
    border-radius: 14px; padding: 8px 12px; line-height: 1.5;
  }

  /* 键盘可达:统一聚焦轮廓,方便用键盘/辅助设备操作 */
  button:focus-visible, textarea:focus-visible {
    outline: 3px solid var(--teal); outline-offset: 2px;
  }

  /* 适老化 · 大字体模式(放大关键文字与可点区域) */
  body.big .bubble { font-size: 1.25rem; line-height: 1.75; }
  body.big header h1 { font-size: 1.55rem; }
  body.big header p { font-size: .98rem; }
  body.big textarea { font-size: 1.2rem; }
  body.big .send { font-size: 1.15rem; height: 54px; }
  body.big .quick button { font-size: 1rem; padding: 9px 15px; }
  body.big .meta, body.big .pref-note { font-size: .96rem; }
  body.big .status-pill, body.big .a11y-toggle { font-size: .92rem; }
  body.big .voice-status { font-size: 1.05rem; }
  body.big .voice-transcript { font-size: 1rem; }
  body.big .mic-toggle { width: 60px; height: 60px; font-size: 1.55rem; }

  /* 窄屏适配 */
  @media (max-width: 520px) {
    body { padding: 12px 8px; }
    .app { height: calc(100vh - 24px); }
    header { padding: 12px; }
    .status-pill { font-size: .72rem; padding: 6px 8px; }
    .bubble { max-width: 84%; }
    .send { padding: 0 16px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="avatar" aria-hidden="true">🍚</div>
    <div>
      <h1>小瓜</h1>
      <p>陪你慢慢吃饭的伙伴 · 温柔家人感</p>
    </div>
    <div class="header-actions">
      <button class="a11y-toggle" id="fontToggle" type="button" aria-pressed="false"
              aria-label="切换大字体模式" title="放大文字,方便阅读">大字体</button>
      <div class="status-pill" id="statusPill" role="status" aria-live="polite">状态:还没取餐</div>
    </div>
  </header>

  <section class="voice-panel" aria-label="语音输入">
    <button class="mic-toggle" id="micToggle" type="button"
            aria-label="开启或关闭麦克风" aria-pressed="false" title="开启或关闭麦克风">&#127908;</button>
    <div class="voice-copy">
      <span class="voice-status" id="voiceStatus" data-state="idle" role="status" aria-live="polite">麦克风已关闭</span>
      <output class="voice-transcript" id="voiceTranscript">点亮麦克风后,说“小瓜小瓜”唤醒,再说出你的需求</output>
    </div>
  </section>

  <div class="chat" id="chat" role="log" aria-live="polite" aria-relevant="additions" aria-label="与小瓜的对话记录">
    <div class="row bot">
      <div class="mini-avatar bot">🍚</div>
      <div class="bubble">你好呀,我是小瓜~ 想吃饭了就跟我说一声,咱们慢慢来。</div>
    </div>
  </div>

  <div class="composer">
    <textarea id="input" rows="1" aria-label="对小瓜说的话" placeholder="对小瓜说点什么…(回车发送,Shift+回车换行)"></textarea>
    <button class="send" id="send" type="button" aria-label="发送消息">发送</button>
  </div>
  <div class="quick" id="quick" role="group" aria-label="快捷短语">
    <button data-t="喂我吃饭吧">喂我吃饭吧</button>
    <button data-t="再来一口">再来一口</button>
    <button data-t="不吃了,够了">不吃了</button>
    <button data-t="今天天气真好啊">闲聊一句</button>
    <button data-t="别停">别停</button>
  </div>
  <p class="hint">说“小瓜小瓜”唤醒语音,或直接打字;意图识别与对话由两个 LLM 分别处理,命令会触发机械臂动作(当前为演示)。</p>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusPill = document.getElementById('statusPill');
const FETCH_TIMEOUT_MS = 18000;

// 转义所有模型/后端返回的文本再插入 innerHTML,避免 XSS(reason 等由 LLM 生成)。
function escapeHtml(value) {
  return String(value == null ? '' : value)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function addBubble(text, who) {
  const row = document.createElement('div');
  row.className = 'row ' + who;
  row.innerHTML = `<div class="mini-avatar ${who}">${who === 'bot' ? '🍚' : '🙂'}</div>
                   <div class="bubble"></div>`;
  row.querySelector('.bubble').textContent = text;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

// 机械臂动作 key → 中文标签(时间线展示用)
const STEP_LABELS = { acquire_food: '取餐', deliver_food: '送餐', stop_feeding: '停止' };

function addMeta(data) {
  const el = document.createElement('div');
  el.className = 'meta';
  const conf = Number(data.confidence).toFixed(2);
  const reason = escapeHtml(data.reason);
  if (data.type === 'COMMAND') {
    const rawSteps = (data.action && Array.isArray(data.action.steps)) ? data.action.steps : [];
    const stepsHtml = rawSteps.length
      ? rawSteps.map(s => `<span class="step">${escapeHtml(STEP_LABELS[s] || s)}</span>`).join('<span class="arrow">→</span>')
      : '<span class="step">—</span>';
    el.innerHTML = `<span class="tag cmd">命令</span> 意图 <code>${escapeHtml(data.intent)}</code> · 置信 ${conf}<br>
                    机械臂动作:<span class="steps">${stepsHtml}</span><br>
                    <span style="opacity:.8">判断依据:${reason}</span>`;
  } else {
    el.innerHTML = `<span class="tag talk">对话</span> 置信 ${conf}
                    <br><span style="opacity:.8">判断依据:${reason}</span>`;
  }
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

// 一顿饭结束时,小瓜从对话里学到并记住的吃饭偏好(后端在 meal_ended 时回传 prefSaved)。
function addPrefNote(prefs) {
  const items = prefs.map(p => escapeHtml(p && p.value)).filter(Boolean).join('、');
  if (!items) return;
  const el = document.createElement('div');
  el.className = 'pref-note';
  el.innerHTML = `<b>小瓜记住了</b>:这顿饭学到的偏好 —— ${items}`;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

// 统一渲染一条 agent 结果(文本聊天与语音链路共用),data 为后端 process() 的返回。
function renderAgentResult(data) {
  addMeta(data);
  addBubble(data.reply || '好的。', 'bot');
  if (Array.isArray(data.prefSaved) && data.prefSaved.length) addPrefNote(data.prefSaved);
  if (data.feedingState) statusPill.textContent = '状态:' + data.feedingState;
}

async function send(text) {
  if (!text.trim()) return;
  addBubble(text, 'user');
  input.value = '';
  autoresize();
  sendBtn.disabled = true;

  const typing = addBubble('小瓜正在想…', 'bot');
  typing.querySelector('.bubble').classList.add('typing');

  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text }),
      signal: controller.signal
    });
    clearTimeout(timer);
    const data = await res.json();
    typing.remove();

    if (data.error) {
      addBubble('(出了点小问题:' + data.error + ')', 'bot');
    } else {
      renderAgentResult(data);
    }
  } catch (e) {
    typing.remove();
    if (e.name === 'AbortError') {
      addBubble('我这会儿网络有点慢,你稍等一下,或者再发一遍给我。', 'bot');
    } else {
      addBubble('(连不上小瓜的后台,请确认服务已启动)', 'bot');
    }
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

function autoresize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}

input.addEventListener('input', autoresize);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(input.value); }
});
sendBtn.addEventListener('click', () => send(input.value));
document.getElementById('quick').addEventListener('click', e => {
  if (e.target.dataset.t) send(e.target.dataset.t);
});

// 语音链路:语音客户端(voice-client.js)在识别到最终文本、以及后端 agent 结果就绪时,
// 分别派发 hey-rice-final-transcript / hey-rice-agent-result 事件,这里把它们渲染进同一个对话流。
window.addEventListener('hey-rice-final-transcript', event => {
  addBubble(event.detail.text, 'user');
});
window.addEventListener('hey-rice-agent-result', event => {
  const data = event.detail.result;
  if (!data || data.error) {
    addBubble('(' + ((data && data.error) || 'Agent 处理失败') + ')', 'bot');
    return;
  }
  renderAgentResult(data);
});

// 适老化 · 大字体模式:切换 body.big,并记住用户的选择。
const fontToggle = document.getElementById('fontToggle');
function applyBigFont(on) {
  document.body.classList.toggle('big', on);
  fontToggle.setAttribute('aria-pressed', on ? 'true' : 'false');
}
try {
  applyBigFont(localStorage.getItem('xiaogua_big_font') === '1');
} catch (e) { /* localStorage 不可用时忽略,默认小字体 */ }
fontToggle.addEventListener('click', () => {
  const on = !document.body.classList.contains('big');
  applyBigFont(on);
  try { localStorage.setItem('xiaogua_big_font', on ? '1' : '0'); } catch (e) { /* 忽略持久化失败 */ }
});

input.focus();
</script>
<script src="/static/voice-client.js"></script>
</body>
</html>
